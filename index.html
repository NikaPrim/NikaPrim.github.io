'), then to the reticulum, later to the omasum, and finally to the abomasum (which is most like a more sensitive human stomach).</li><li>Goats are burpers! This is due to the role of their rumen. The rumen, which in a mature goat holds four to five gallons of plant material, breaks down cellulose and acts as a fermentation vat. Of course, fermentation produces gas, and this gas escapes in the form of loud, healthy burps. Our goats can frequently be heard burping in the barn.</li></ul>";
